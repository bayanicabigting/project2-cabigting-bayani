<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bungo Stray Dogs: BEAST</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            color: white;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0b0b0f;
        }

        h2 {
            margin-top: -10px;
            margin-bottom: 20px;
            font-weight: normal;
            color: #ccc;
        }

        footer {
            position: absolute;
            bottom: 10px;
            font-size: 12px;
            color: #888;
        }

        #scene {
            position: relative;
            width: 800px;
            height: 400px;
            border: 3px solid #444;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.7);
            transition: transform 0.4s ease;
            transform-origin: center;
        }

        #bg {
            position: absolute;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            z-index: 0;
            transition: opacity 0.6s ease;
            opacity: 1;
        }

        #game {
            width: 800px;
            max-width: 95%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #sprite-layer {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }

        .sprite-left {
            left: 20px;
            transform: translateY(10px);
        }

        .sprite-center {
            left: 50%;
            transform: translateX(-50%);
        }

        .sprite-right {
            right: 20px;
            transform: translateY(10px);
        }

        .sprite {
            position: absolute;
            bottom: 0;
            height: 90%;
            width: auto;
            max-width: 45%;
            object-fit: contain;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .sprite.show {
            opacity: 1;
        }

        #vn-box {
            width: 775px;
            background: rgba(0,0,0,0.8);
            border: 2px solid #444;
            border-radius: 10px;
            margin-top: 15px;
            padding: 25px 15px 15px 15px;
            font-size: 18px;
            line-height: 1.5;
            position: relative;
        }

        #vn-box,
        #choices {
            display: none;
        }

        #name-tag {
            position: absolute;
            top: -15px;
            left: 12px;
            padding: 4px 10px;
            background: rgba(20, 20, 20, 0.95);
            border: 1px solid #555;
            border-radius: 6px;
            font-weight: bold;
            font-size: 14px;
            color: white;
        }

        #start-screen {
            width: 100%;
            margin-top: 170px;
            color: white;
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        .choice-btn {
            width: 100%;
            margin-top: 8px;
            padding: 10px;
            background: #222;
            border: 1px solid #444;
            color: white;
            cursor: pointer;
        }

        .choice-btn:hover {
            background: #333;
        }
    </style>
</head>

<body>

<div id="game">

    <h1>Bungo Stray Dogs: BEAST</h1>
    <h2>A Text-Based Adventure Game</h2>

    <div id="scene">

    <div id="bg"> 
        <div id="start-screen">
        <button id="start-btn" class="choice-btn">Start Game</button>
        </div>
    </div>

    <div id="sprite-layer"></div>

    </div>

    <div id="vn-box">
        <div id="name-tag"></div>
        <div id="text"></div>
    </div>

    <div id="choices"></div>

</div>

<footer>
    <p>Developed by Bayani Marcel Cabigting. Based on the novel <em>Bungo Stray Dogs: BEAST</em> by Kafka Asagiri.</p>
</footer>

<script src="index.js"></script>

</body>
</html>
